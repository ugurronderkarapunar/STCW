[tool.black]
line-length = 100
target-version = ['py39']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.git
  | \.venv
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 100
target-version = "py39"
select = ["E", "F", "I", "N", "W"]
ignore = ["E501"]
exclude = [".git", ".venv", "build", "dist"]

[tool.ruff.isort]
known-first-party = ["utils", "components", "services", "pages"]
